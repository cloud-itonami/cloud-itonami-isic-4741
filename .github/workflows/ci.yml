name: ci

# Kept correct and ready for when Actions are enabled on the org.
# Until then: run locally with `clojure -M:lint` and `clojure -M:dev:test`.
#
# Workspace layout: deps use :local/root to kotoba-lang/langgraph,
# kotoba-lang/langchain and kotoba-lang/robotics (all public; robotics
# itself further :local/root's to kotoba-lang/html and kotoba-lang/css
# as siblings). CI reconstructs sibling paths for the :local/root deps
# (including robotics's own transitive :local/root deps -- html/css must
# also be checked out here, not just where robotics's OWN deps.edn would
# resolve them, since GitHub Actions checkout does not follow local/root
# chains).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.0
        with: { cli: latest }
      - name: clj-kondo (errors fail the build)
        run: clojure -M:lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: orgs/cloud-itonami/cloud-itonami-isic-4741 }
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/langgraph
          path: orgs/kotoba-lang/langgraph
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/robotics
          path: orgs/kotoba-lang/robotics
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/html
          path: orgs/kotoba-lang/html
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/css
          path: orgs/kotoba-lang/css
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/langchain
          path: orgs/kotoba-lang/langchain
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.0
        with: { cli: latest }
      - name: test (governor · store parity · export · phases · facts)
        working-directory: orgs/cloud-itonami/cloud-itonami-isic-4741
        run: clojure -M:dev:test
